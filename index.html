<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Sergey Yakovlev</title>
  <meta charset="UTF-8">
  <meta name="description" content="Designer Portfolio" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
 

<style>
  body {
background: #EEE;
  }
    
  #menu {
     touch-action: none;
    position: fixed;
    top: 0;
    left: 0;

    background: black;
    color: white;
    font-family: Arial, sans-serif;
    border: 2px solid white;
    user-select: none;
    
  border-radius: 3px;
    overflow: hidden;
    transform: translate(50px, 50px); 
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }

#menu.dragging {
  transition: none;
}

  .header {
    padding: 10px 14px;
    font-weight: bold;
    background: #111;
  cursor: grab; 

    transition: opacity 0.2s ease;
  }
  
#menu.open .header {
border-bottom: 2px dotted white;
}
    
  .submenu {
    display: flex;
    flex-direction: column;
    gap: 0px;
    padding: 0px 0px;

    max-height: 0;
    opacity: 0;
    overflow: hidden;

    transform: translateY(-5px);
    transition: all 0.25s ease;
  }

  #menu.open .submenu {
    max-height: 200px;
    opacity: 1;
    transform: translateY(0);
  }

  .item {
    padding: 14px 28px;
    border: 0px solid white;
    cursor: pointer;

      transition: 
    background 0.2s ease,
    color 0.2s ease,
    transform 0.15s ease;
  }

  .label {
  display: inline-block;
  transition: transform 0.15s ease;
}
  
  .item:hover {
    background: white;
    color: black;
  }

.item:hover .label {
  transform: translateY(3px);
  transform: translateX(3px);/* лёгкий сдвиг */
}
  
  .item.active {
    font-weight: bold;
  }
</style>
</head>

<body>

<div id="menu">
  <div class="header">MENU ⏷</div>

  <div class="submenu">
<div class="item"><span class="label">submenu1</span></div>
<div class="item"><span class="label">submenu2</span></div>
<div class="item"><span class="label">submenu3</span></div>
  </div>
</div>

<script>
const menu = document.getElementById("menu");
const items = document.querySelectorAll(".item");
  const header = document.querySelector(".header");

let isOpen = false;

  
items.forEach(item => {
  item.addEventListener("click", (e) => {
    e.stopPropagation();

    // убрать active у всех
    items.forEach(i => i.classList.remove("active"));

    // добавить только текущему
    item.classList.add("active");
  });
});

// ======================
// DRAG + SAFE BOUNDS
// ======================
let isDragging = false;
let dragged = false;

let startX, startY;
let offsetX = 50, offsetY = 50;

const DRAG_THRESHOLD = 1;

function clampPosition(x, y) {
  const rect = menu.getBoundingClientRect();

  const maxX = window.innerWidth - rect.width;
  const maxY = window.innerHeight - rect.height;

  return {
    x: Math.max(0, Math.min(x, maxX)),
    y: Math.max(0, Math.min(y, maxY))
  };
}

header.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  isDragging = true;
  dragged = false;
  
  menu.classList.add("dragging");

header.style.cursor = "grabbing";
  
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;

  header.setPointerCapture(e.pointerId);
});

header.addEventListener("pointermove", (e) => {
  if (!isDragging) return;

  let x = e.clientX - startX;
  let y = e.clientY - startY;

  const clamped = clampPosition(x, y);

  if (Math.abs(clamped.x - offsetX) > DRAG_THRESHOLD ||
      Math.abs(clamped.y - offsetY) > DRAG_THRESHOLD) {
    dragged = true;
  }

  offsetX = clamped.x;
  offsetY = clamped.y;

  menu.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
});

header.addEventListener("pointerup", (e) => {
  isDragging = false;

  menu.classList.remove("dragging");
   header.style.cursor = "grab";
  header.releasePointerCapture(e.pointerId);

  

  if (dragged) return;
  
// 👉 если открываем
    if (!isOpen) {
    const submenuHeight = menu.querySelector(".submenu").scrollHeight;
    const rect = menu.getBoundingClientRect();

    let newY = offsetY;

    const futureBottom = rect.bottom + submenuHeight;

    if (futureBottom > window.innerHeight) {
      newY -= (futureBottom - window.innerHeight);
    }

    newY = Math.max(0, newY);

    offsetY = newY;

    menu.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
  }

  // toggle меню только если это не drag
  isOpen = !isOpen;
  menu.classList.toggle("open", isOpen);
  
  header.style.opacity = 0.9;
setTimeout(() => {
 header.textContent = isOpen ? "MENU ⏶" : "MENU ⏷";
  header.style.opacity = 1;
}, 150);
  header.textContent = isOpen ? "MENU ⏶" : "MENU ⏷";

  // 🟡 после изменения размера — проверяем границы заново

});


  header.addEventListener("pointercancel", () => {
  isDragging = false;
  header.style.cursor = "grab";
});

// при изменении размера окна — тоже держим внутри
window.addEventListener("resize", () => {
  const clamped = clampPosition(offsetX, offsetY);
  offsetX = clamped.x;
  offsetY = clamped.y;
  menu.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
});
</script>

</body>
</html>
